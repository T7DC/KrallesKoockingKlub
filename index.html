<!DOCTYPE html>
<html>
<head>
  <title>Boodschappenlijst</title>
</head>
<body>

<h1>Boodschappenlijst 🛒</h1>

<h2>🥩 Vlees</h2>
<label><input type="checkbox" id="vlees_ribben"> Ribben – 2,4 kg</label><br>
<label><input type="checkbox" id="vlees_worsten"> Worsten – 1,8 kg</label><br>
<label><input type="checkbox" id="vlees_fakkels"> Fakkels – 1,8 kg</label><br>
<label><input type="checkbox" id="vlees_steak"> Prime steak – 3,6 kg</label><br>

<h2>🥦 Groenten & bijgerechten</h2>
<label><input type="checkbox" id="bij_stokbrood"> Stokbrood – 6 à 7 stuks</label><br>
<label><input type="checkbox" id="bij_sla"> Sla / sla mix – 1,0 à 1,1 kg totaal</label><br>
<label><input type="checkbox" id="bij_tomaten"> Tomaten – 2,0 à 2,5 kg totaal</label><br>
<label><input type="checkbox" id="bij_komkommer"> Komkommer – 2 stuks</label><br>
<label><input type="checkbox" id="bij_paprika"> Paprika / grillgroenten – 1,5 à 1,8 kg totaal</label><br>
<label><input type="checkbox" id="bij_aardappelen"> Aardappelen – 3,3 à 3,6 kg</label><br>

<h2>🍞 Ontbijt (2x)</h2>
<label><input type="checkbox" id="ontbijt_brood"> Brood / sandwiches – 4,0 à 4,5 kg totaal</label><br>
<label><input type="checkbox" id="ontbijt_boter"> Boter – 400 à 500 g</label><br>
<label><input type="checkbox" id="ontbijt_eieren"> Eieren – 36 à 48 stuks</label><br>
<label><input type="checkbox" id="ontbijt_kaas"> Kaas – 1,2 à 1,5 kg</label><br>
<label><input type="checkbox" id="ontbijt_charcuterie"> Charcuterie – 1,2 à 1,5 kg</label><br>
<label><input type="checkbox" id="ontbijt_zoet"> Confituur / choco – 600 à 800 g totaal</label><br>

<h2>🍝 Spaghetti</h2>
<label><input type="checkbox" id="spaghetti_pasta"> Droge spaghetti – 1,5 kg</label><br>
<label><input type="checkbox" id="spaghetti_saus"> Spaghettisaus – 3,0 kg</label><br>
<label><input type="checkbox" id="spaghetti_kaas"> Geraspte kaas – 300 à 400 g</label><br>

<h2>🧂 Sauzen & extras</h2>
<label><input type="checkbox" id="extra_mayo"> Mayonaise – 1 grote bokaal</label><br>
<label><input type="checkbox" id="extra_ketchup"> Ketchup – 1 fles</label><br>
<label><input type="checkbox" id="extra_bbqsaus"> BBQ-saus – 1 fles</label><br>
<label><input type="checkbox" id="extra_mosterd"> Samoerai – 1 pot</label><br>
<label><input type="checkbox" id="extra_kruidenboter"> Kruidenboter – 250 à 300 g</label><br>




<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
  import { getDatabase, ref, set, onValue } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-database.js";

  const firebaseConfig = {
    apiKey: "AIzaSyB7Cwb2N_3hb4nrm7lZ405Eeg5O_XsT_Fk",
    authDomain: "kralleskoockingklub.firebaseapp.com",
    databaseURL: "https://kralleskoockingklub-default-rtdb.europe-west1.firebasedatabase.app",
    projectId: "kralleskoockingklub"
  };

  const app = initializeApp(firebaseConfig);
  const db = getDatabase(app);

  const checkboxes = document.querySelectorAll("input[type=checkbox]");

  checkboxes.forEach(cb => {
    const itemRef = ref(db, "checklist/" + cb.id);

    // ✅ Luister realtime
    onValue(itemRef, (snapshot) => {
      const value = snapshot.val();
      if (value !== null) {
        cb.checked = value;
      }
    });

    // ✅ Save bij change
    cb.addEventListener("change", () => {
      set(itemRef, cb.checked);
    });
  });
</script>

</body>
</html>
